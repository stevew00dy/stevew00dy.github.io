<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" width="960" height="840">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1f2e"/>
      <stop offset="1" stop-color="#0f1420"/>
    </linearGradient>
    <filter id="shadow" x="-2" y="-2" width="484" height="424">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="480" height="420" rx="12" fill="url(#bg)" stroke="#252b3b" stroke-width="1" filter="url(#shadow)"/>
  <!-- Flight Performances -->
  <text x="24" y="36" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6ee7b7">» Flight Performances</text>
  <text x="380" y="36" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9ca3af">Mode toggling 1s (+4 QD)</text>
  <line x1="24" y1="48" x2="456" y2="48" stroke="#303749" stroke-width="1"/>
  <text x="24" y="72" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e5e7eb">SCM / Forward Boost</text>
  <text x="320" y="72" font-family="JetBrains Mono, monospace" font-size="12" fill="#f59e0b">262 / 610 m/s</text>
  <text x="24" y="96" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e5e7eb">NAV</text>
  <text x="320" y="96" font-family="JetBrains Mono, monospace" font-size="12" fill="#f59e0b">1425 m/s</text>
  <line x1="24" y1="112" x2="456" y2="112" stroke="#303749" stroke-width="1"/>
  <text x="24" y="136" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e5e7eb">Boost Ramp Up / Ramp Down</text>
  <text x="320" y="136" font-family="JetBrains Mono, monospace" font-size="12" fill="#f59e0b">0.4 / 0.2 s</text>
  <line x1="24" y1="152" x2="456" y2="152" stroke="#303749" stroke-width="1"/>
  <text x="24" y="176" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e5e7eb">Pitch / Yaw / Roll</text>
  <text x="280" y="176" font-family="JetBrains Mono, monospace" font-size="12" fill="#f59e0b">53 / 48 / 190 °/s</text>
  <text x="24" y="200" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e5e7eb">Boosted</text>
  <text x="280" y="200" font-family="JetBrains Mono, monospace" font-size="12" fill="#f59e0b">63.6 / 57.6 / 228 °/s</text>
  <!-- Accelerations -->
  <text x="24" y="248" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#6ee7b7">» Accelerations</text>
  <text x="360" y="248" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9ca3af">Last check 87 days</text>
  <line x1="24" y1="260" x2="456" y2="260" stroke="#303749" stroke-width="1"/>
  <text x="24" y="284" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e5e7eb">Main</text>
  <text x="320" y="284" font-family="JetBrains Mono, monospace" font-size="12" fill="#f59e0b">15.5 (26.0) G</text>
  <text x="24" y="308" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e5e7eb">Retro</text>
  <text x="320" y="308" font-family="JetBrains Mono, monospace" font-size="12" fill="#f59e0b">4.0 (5.2) G</text>
  <text x="24" y="332" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e5e7eb">Up</text>
  <text x="320" y="332" font-family="JetBrains Mono, monospace" font-size="12" fill="#f59e0b">6.0 (8.1) G</text>
  <text x="24" y="356" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e5e7eb">Down</text>
  <text x="320" y="356" font-family="JetBrains Mono, monospace" font-size="12" fill="#f59e0b">4.0 (5.4) G</text>
  <text x="24" y="380" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e5e7eb">Strafe</text>
  <text x="320" y="380" font-family="JetBrains Mono, monospace" font-size="12" fill="#f59e0b">6.0 (8.1) G</text>
  <!-- Label -->
  <text x="24" y="412" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">spviewer.eu  Flight Performances &amp; Accelerations</text>
</svg>
